name: reproduce-the-numbers

# Mechanical first pass of the review in PUBLISHING.md. A pull request re-derives only the numbers it
# could have affected: the instrument control plus the studies whose files it changed. The full
# manifest is reproduced by reproduce-all-nightly.yml.

on:
  pull_request:
    branches: [contrib, main]

concurrency:
  group: reproduce-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-latest
    # Most PRs select a small subset and finish in seconds. The exception is a shared-infra change, which
    # re-verifies the whole non-slow manifest; that path grows with the study count, so the budget is 60m.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: List changed files
        run: git diff --name-only "${{ github.event.pull_request.base.sha }}...HEAD" > changed.txt && cat changed.txt

      - name: Reproduce the numbers this PR could affect
        env:
          PYPHI_WELCOME_OFF: "true"
        run: python ci/reproduce.py --changed-file changed.txt
