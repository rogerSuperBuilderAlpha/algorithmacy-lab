name: reproduce-the-numbers

# Mechanical first pass of the review in PUBLISHING.md: re-derive every registered number from its
# committed script. Runs on pull requests into the integration and published branches.

on:
  pull_request:
    branches: [contrib, main]
  push:
    branches: [contrib, main]
  workflow_dispatch:

concurrency:
  group: reproduce-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Reproduce the numbers
        env:
          PYPHI_WELCOME_OFF: "true"
        run: python ci/reproduce.py
